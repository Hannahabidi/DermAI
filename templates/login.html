<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>DermAI - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 48px 40px;
            width: 420px;
        }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo i { font-size: 48px; color: #00d4aa; }
        .logo h1 { color: white; font-size: 28px; font-weight: 700; margin-top: 8px; }
        .logo p { color: rgba(255,255,255,0.5); font-size: 13px; }
        .form-control {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            border-radius: 12px;
            padding: 14px 16px;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.12);
            border-color: #00d4aa;
            color: white;
            box-shadow: 0 0 0 3px rgba(0,212,170,0.2);
        }
        .form-control::placeholder { color: rgba(255,255,255,0.35); }
        .input-group-text {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #00d4aa;
        }
        .btn-login {
            background: linear-gradient(135deg, #00d4aa, #0099ff);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            width: 100%;
            margin-top: 8px;
        }
        .btn-login:hover { transform: translateY(-2px); color: white; }
        .form-label { color: rgba(255,255,255,0.7); font-size: 13px; }
        .alert { border-radius: 12px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <i class="fas fa-microscope"></i>
            <h1>DermAI</h1>
            <p>Détection intelligente du cancer de peau</p>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
        <div class="alert alert-{{cat}} mb-3">{{msg}}</div>
        {% endfor %}
        {% endwith %}
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Nom d'utilisateur</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Username" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Mot de passe</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-login">
                <i class="fas fa-sign-in-alt me-2"></i>Se connecter
            </button>
        </form>
    </div>
</body>
</html>
