<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>DermAI - Résultat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 48px 40px;
            width: 500px;
            text-align: center;
        }
        .result-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        .result-malignant { color: #ff6b6b; }
        .result-benign { color: #00d4aa; }
        .result-title {
            font-size: 32px;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
        }
        .result-subtitle {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            margin-bottom: 32px;
        }
        .prob-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 50px;
            height: 12px;
            margin: 12px 0 24px;
            overflow: hidden;
        }
        .prob-fill {
            height: 100%;
            border-radius: 50px;
            transition: width 1s ease;
        }
        .prob-malignant { background: linear-gradient(90deg, #ff6b6b, #ee0979); }
        .prob-benign { background: linear-gradient(90deg, #00d4aa, #0099ff); }
        .prob-label {
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            text-align: left;
            margin-bottom: 4px;
        }
        .prob-value {
            color: white;
            font-size: 28px;
            font-weight: 700;
        }
        .patient-img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 16px;
            border: 3px solid rgba(255,255,255,0.15);
            margin: 24px auto;
            display: block;
        }
        .btn-back {
            background: linear-gradient(135deg, #00d4aa, #0099ff);
            border: none;
            border-radius: 12px;
            padding: 14px 32px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            text-decoration: none;
            display: inline-block;
            margin-top: 8px;
            transition: all 0.3s;
        }
        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,212,170,0.4);
            color: white;
        }
        .badge-result {
            display: inline-block;
            padding: 6px 20px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 24px;
        }
        .badge-malignant {
            background: rgba(255,107,107,0.15);
            color: #ff6b6b;
            border: 1px solid rgba(255,107,107,0.3);
        }
        .badge-benign {
            background: rgba(0,212,170,0.15);
            color: #00d4aa;
            border: 1px solid rgba(0,212,170,0.3);
        }
    </style>
</head>
<body>
    <div class="card">
        {% if result == "Malignant" %}
            <div class="result-icon result-malignant"><i class="fas fa-exclamation-triangle"></i></div>
            <p class="result-title">Malignant</p>
            <p class="result-subtitle">Lésion potentiellement dangereuse détectée</p>
            <span class="badge-result badge-malignant"><i class="fas fa-virus me-1"></i>Consultation médicale urgente recommandée</span>
            <img src="{{ img }}" class="patient-img" alt="Lésion">
            <p class="prob-label">Taux de confiance</p>
            <p class="prob-value">{{ prob }}%</p>
            <div class="prob-bar">
                <div class="prob-fill prob-malignant" style="width: {{ prob }}%"></div>
            </div>
        {% else %}
            <div class="result-icon result-benign"><i class="fas fa-check-circle"></i></div>
            <p class="result-title">Bénin</p>
            <p class="result-subtitle">Aucune anomalie maligne détectée</p>
            <span class="badge-result badge-benign"><i class="fas fa-shield-alt me-1"></i>Résultat rassurant</span>
            <img src="{{ img }}" class="patient-img" alt="Lésion">
            <p class="prob-label">Taux de confiance</p>
            <p class="prob-value">{{ prob }}%</p>
            <div class="prob-bar">
                <div class="prob-fill prob-benign" style="width: {{ prob }}%"></div>
            </div>
        {% endif %}
        <br>
        <a href="/dashboard" class="btn-back"><i class="fas fa-home me-2"></i>Retour au Dashboard</a>
    </div>
</body>
</html>
