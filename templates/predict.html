<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>DermAI - Analyse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: 'Segoe UI', sans-serif;
        }
        .navbar {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 16px 32px;
        }
        .navbar-brand {
            color: #00d4aa !important;
            font-size: 22px;
            font-weight: 700;
        }
        .main {
            padding: 60px 32px;
            max-width: 600px;
            margin: auto;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 48px 40px;
        }
        .card-title {
            color: white;
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
        }
        .card-subtitle {
            color: rgba(255,255,255,0.45);
            text-align: center;
            font-size: 14px;
            margin-bottom: 36px;
        }
        .form-label { color: rgba(255,255,255,0.7); font-size: 13px; margin-bottom: 6px; }
        .form-control {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 15px;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.12);
            border-color: #00d4aa;
            color: white;
            box-shadow: 0 0 0 3px rgba(0,212,170,0.2);
        }
        .form-control::placeholder { color: rgba(255,255,255,0.35); }
        .upload-area {
            border: 2px dashed rgba(0,212,170,0.4);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .upload-area:hover {
            border-color: #00d4aa;
            background: rgba(0,212,170,0.05);
        }
        .upload-area i {
            font-size: 36px;
            color: #00d4aa;
            margin-bottom: 12px;
        }
        .upload-area p {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            margin: 0;
        }
        .upload-area input[type=file] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }
        #preview {
            width: 100%;
            border-radius: 12px;
            margin-top: 12px;
            display: none;
        }
        .btn-analyse {
            background: linear-gradient(135deg, #00d4aa, #0099ff);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            width: 100%;
            margin-top: 8px;
            transition: all 0.3s;
        }
        .btn-analyse:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,212,170,0.4);
            color: white;
        }
        .btn-back {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 10px 20px;
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            display: inline-block;
            margin-bottom: 24px;
            transition: all 0.3s;
        }
        .btn-back:hover { color: white; border-color: rgba(255,255,255,0.5); }
        .alert { border-radius: 12px; font-size: 14px; }
    </style>
</head>
<body>
    <nav class="navbar d-flex justify-content-between align-items-center">
        <span class="navbar-brand"><i class="fas fa-microscope me-2"></i>DermAI</span>
    </nav>
    <div class="main">
        <a href="/dashboard" class="btn-back"><i class="fas fa-arrow-left me-2"></i>Retour</a>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
        <div class="alert alert-{{cat}} mb-3">{{msg}}</div>
        {% endfor %}
        {% endwith %}
        <div class="card">
            <p class="card-title"><i class="fas fa-search-plus me-2" style="color:#00d4aa"></i>Analyse Patient</p>
            <p class="card-subtitle">Remplissez les informations et uploadez l'image de la lésion</p>
            <form method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label">Nom du patient</label>
                    <input type="text" name="name" class="form-control" placeholder="Nom complet" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Âge</label>
                    <input type="number" name="age" class="form-control" placeholder="Âge" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Image de la lésion</label>
                    <div class="upload-area">
                        <input type="file" name="image" accept="image/*" required onchange="previewImage(this)">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Cliquez ou glissez une image ici</p>
                    </div>
                    <img id="preview" src="" alt="preview">
                </div>
                <button type="submit" class="btn btn-analyse">
                    <i class="fas fa-brain me-2"></i>Lancer l'analyse IA
                </button>
            </form>
        </div>
    </div>
    <script>
        function previewImage(input) {
            const preview = document.getElementById('preview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
